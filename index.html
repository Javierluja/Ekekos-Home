<!DOCTYPE html>
<!-- Ekekos Home — App v1.0 — Mobile-first SPA -->
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Ekekos Home</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<style>
:root{--bg:#101415;--surface:#1d2022;--surface-high:#272a2c;--surface-highest:#323537;--primary:#bec6e0;--accent:#4edea3;--accent-dim:#00a572;--on-accent:#003824;--error:#ffb4ab;--error-dim:#93000a;--on-surface:#e0e3e5;--on-surface-v:#c6c6cd;--outline:#909097;--outline-v:#45464d;--nav-bg:rgba(13,17,18,0.96)}
[data-theme="light"]{--bg:#f7f9fb;--surface:#ffffff;--surface-high:#e6e8ea;--surface-highest:#e0e3e5;--primary:#0c1427;--accent:#006c49;--accent-dim:#6cf8bb;--on-accent:#fff;--error:#ba1a1a;--error-dim:#ffdad6;--on-surface:#191c1e;--on-surface-v:#45474c;--outline:#75777d;--outline-v:#c5c6cd;--nav-bg:rgba(247,249,251,0.96)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--on-surface);max-width:430px;margin:0 auto;position:relative;transition:background .3s,color .3s}
h1,h2,h3,.mf{font-family:'Manrope',sans-serif}
.mi{font-family:'Material Symbols Outlined','Material Icons Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;font-size:24px;line-height:1;vertical-align:middle;display:inline-block}
.mi.fill{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}

/* ─── App container ─── */
#app{position:fixed;inset:0;max-width:430px;margin:0 auto;display:flex;flex-direction:column;overflow:hidden}
#screen{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#screen::-webkit-scrollbar{display:none}

/* ─── Bottom Nav ─── */
#nav{height:72px;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--outline-v);display:none;align-items:center;justify-content:space-around;padding:0 4px;flex-shrink:0;z-index:100}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 16px;border-radius:16px;cursor:pointer;transition:all .2s;color:var(--outline);background:none;border:none;font-family:'Inter',sans-serif;flex:1}
.ni .lbl{font-size:10px;font-weight:600;letter-spacing:.3px}
.ni.active{color:var(--accent)}
.ni.active .mi{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
.fab{width:56px;height:56px;border-radius:18px;background:var(--accent);color:var(--on-accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(78,222,163,.35);transition:all .2s;flex-shrink:0}
.fab:active{transform:scale(.9)}

/* ─── Cards & surfaces ─── */
.card{background:var(--surface);border-radius:20px;overflow:hidden}
.surface-high{background:var(--surface-high)}

/* ─── Buttons ─── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 24px;border-radius:16px;font-family:'Manrope',sans-serif;font-weight:700;font-size:15px;border:none;cursor:pointer;transition:all .2s;width:100%}
.btn:active{transform:scale(.97);opacity:.9}
.btn-accent{background:var(--accent);color:var(--on-accent);box-shadow:0 4px 16px rgba(78,222,163,.2)}
.btn-surface{background:var(--surface-high);color:var(--on-surface)}
.btn-ghost{background:transparent;border:1.5px solid var(--outline-v);color:var(--on-surface-v);font-size:14px;padding:12px 16px}
.btn-danger{background:rgba(255,180,171,.1);border:1.5px solid rgba(255,180,171,.25);color:var(--error)}
.btn-sm{padding:10px 16px;font-size:13px;border-radius:12px}

/* ─── Inputs ─── */
.inp{width:100%;background:var(--surface);border:1.5px solid var(--outline-v);border-radius:14px;padding:14px 16px;color:var(--on-surface);font-family:'Inter',sans-serif;font-size:15px;transition:border-color .2s;outline:none}
.inp:focus{border-color:var(--accent)}
.inp option{background:var(--surface);color:var(--on-surface)}
select.inp{appearance:none;padding-right:36px}
label.lbl{display:block;font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* ─── TopBar ─── */
.topbar{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--outline-v)}
.tb-title{font-family:'Manrope',sans-serif;font-size:18px;font-weight:800;color:var(--on-surface)}
.tb-btn{width:40px;height:40px;border-radius:50%;background:var(--surface);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--on-surface-v);transition:background .2s}
.tb-btn:active{background:var(--surface-high)}

/* ─── Chips / Filters ─── */
.chip{padding:8px 16px;border-radius:99px;background:var(--surface);border:1.5px solid var(--outline-v);color:var(--on-surface-v);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'Inter',sans-serif}
.chip.on{background:var(--accent);color:var(--on-accent);border-color:var(--accent)}
.scroll-x{display:flex;gap:8px;overflow-x:auto;padding:0 20px 4px;scrollbar-width:none}
.scroll-x::-webkit-scrollbar{display:none}

/* ─── Category chips ─── */
.cat-chip{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 10px;border-radius:16px;background:var(--surface-high);border:2px solid transparent;cursor:pointer;transition:all .2s;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--on-surface-v);min-width:68px}
.cat-chip.on{background:var(--accent);color:var(--on-accent);border-color:var(--accent)}
.cat-chip .ci{font-size:24px}

/* ─── Member chips ─── */
.mem-chip{flex:1;padding:10px;border-radius:12px;background:var(--surface-high);border:2px solid transparent;cursor:pointer;transition:all .2s;font-size:13px;font-weight:600;color:var(--on-surface-v);text-align:center;font-family:'Inter',sans-serif;white-space:nowrap}
.mem-chip.on{border-color:var(--accent);color:var(--accent)}

/* ─── Expense item ─── */
.ei{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--outline-v)}
.ei:last-child{border-bottom:none}
.ei:active{background:var(--surface-high)}
.ei-icon{width:48px;height:48px;border-radius:14px;background:var(--surface-high);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

/* ─── Progress bar ─── */
.pb{height:6px;background:var(--surface-high);border-radius:99px;overflow:hidden}
.pb-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .3s}

/* ─── Toggle ─── */
.tog{position:relative;width:48px;height:28px;cursor:pointer;flex-shrink:0}
.tog input{display:none}
.tog-track{position:absolute;inset:0;border-radius:99px;background:var(--outline-v);transition:background .2s}
.tog input:checked+.tog-track{background:var(--accent)}
.tog-thumb{position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);pointer-events:none}
.tog input:checked~.tog-thumb{transform:translateX(20px)}

/* ─── Settings row ─── */
.sr{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--outline-v)}
.sr:last-child{border-bottom:none}
.sr:active{background:var(--surface-high)}
.sr-icon{width:40px;height:40px;border-radius:12px;background:var(--surface-high);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--on-surface-v)}

/* ─── Pct input ─── */
.pct-inp{width:72px;background:var(--surface-high);border:1.5px solid var(--outline-v);border-radius:10px;padding:8px 10px;text-align:center;font-family:'Manrope',sans-serif;font-weight:700;font-size:15px;color:var(--on-surface);outline:none;transition:border .2s}
.pct-inp:focus{border-color:var(--accent)}
.pct-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--outline-v)}
.pct-row:last-child{border-bottom:none}

/* ─── Stat card ─── */
.stat{background:var(--surface);border-radius:18px;padding:18px;transition:background .3s}

/* ─── Bar chart ─── */
.bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-track{width:100%;background:var(--surface-high);border-radius:6px 6px 0 0;display:flex;align-items:flex-end;overflow:hidden}
.bar-fill{width:100%;background:var(--accent);border-radius:4px 4px 0 0;opacity:.6}
.bar-fill.cur{opacity:1}

/* ─── Credit card ─── */
.cc{background:var(--surface);border-radius:20px;overflow:hidden;margin:0 20px 12px}

/* ─── Avatar ─── */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}

/* ─── Toast ─── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface-highest);color:var(--on-surface);padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4);pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── Modal ─── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{width:100%;max-width:430px;background:var(--surface);border-radius:24px 24px 0 0;padding:24px 24px 48px;max-height:85vh;overflow-y:auto}

/* ─── Anim ─── */
@keyframes fadeUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.fade-up{animation:fadeUp .2s ease-out}

/* ─── Empty state ─── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:48px 20px;text-align:center;color:var(--on-surface-v);font-size:14px;line-height:1.6}
.empty .em{font-size:44px}

/* ─── Section title ─── */
.st{font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--outline);padding:0 20px;margin-bottom:8px;display:block}

/* ─── Amount big ─── */
.amount-big{font-family:'Manrope',sans-serif;font-size:54px;font-weight:800;background:none;border:none;color:var(--on-surface);width:200px;text-align:center;outline:none;letter-spacing:-2px}
.amount-big::placeholder{color:var(--outline-v)}

/* ─── Date divider ─── */
.dt-div{padding:10px 16px 2px;font-size:11px;font-weight:700;color:var(--outline);text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div id="toast"></div>

<div id="app">
  <div id="screen"></div>
  <nav id="nav">
    <button class="ni active" id="ni-home" onclick="goTab('home')">
      <span class="mi fill">home</span><span class="lbl">Inicio</span>
    </button>
    <button class="ni" id="ni-gastos" onclick="goTab('gastos')">
      <span class="mi">receipt_long</span><span class="lbl">Gastos</span>
    </button>
    <button class="fab" onclick="push('agregar')">
      <span class="mi fill" style="font-size:30px;">add</span>
    </button>
    <button class="ni" id="ni-creditos" onclick="goTab('creditos')">
      <span class="mi">credit_score</span><span class="lbl">Créditos</span>
    </button>
    <button class="ni" id="ni-perfil" onclick="goTab('perfil')">
      <span class="mi">person</span><span class="lbl">Perfil</span>
    </button>
  </nav>
</div>

<!-- ═══════════════ MODALS ═══════════════ -->
<div class="modal-bg" id="m-credito" onclick="if(event.target===this)closeModal('m-credito')">
  <div class="modal-sheet">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h3 class="mf" style="font-size:18px;font-weight:800">Nuevo Crédito</h3>
      <button class="tb-btn" onclick="closeModal('m-credito')"><span class="mi">close</span></button>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div><label class="lbl">Prestó</label><div style="position:relative"><select class="inp" id="c-de" style="padding-left:44px"></select><span class="mi" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--outline);font-size:18px">person</span></div></div>
      <div><label class="lbl">A</label><div style="position:relative"><select class="inp" id="c-a" style="padding-left:44px"></select><span class="mi" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--outline);font-size:18px">person</span></div></div>
      <div><label class="lbl">Monto Total</label><input class="inp" id="c-monto" type="number" placeholder="0"></div>
      <div><label class="lbl">Descripción</label><input class="inp" id="c-desc" type="text" placeholder="¿Para qué?"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label class="lbl">Cuotas</label><input class="inp" id="c-cuotas" type="number" min="1" placeholder="Ej: 6"></div>
        <div><label class="lbl">Fecha inicio</label><input class="inp" id="c-fecha" type="date"></div>
      </div>
      <button class="btn btn-accent" onclick="saveCredito()"><span class="mi fill">credit_score</span>Registrar Crédito</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="m-pago" onclick="if(event.target===this)closeModal('m-pago')">
  <div class="modal-sheet">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h3 class="mf" style="font-size:18px;font-weight:800">Registrar Pago</h3>
      <button class="tb-btn" onclick="closeModal('m-pago')"><span class="mi">close</span></button>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div><label class="lbl">De</label><select class="inp" id="p-de" style="padding-left:12px"></select></div>
      <div><label class="lbl">Para</label><select class="inp" id="p-a" style="padding-left:12px"></select></div>
      <div><label class="lbl">Monto</label><input class="inp" id="p-monto" type="number" placeholder="0"></div>
      <div><label class="lbl">Nota (opcional)</label><input class="inp" id="p-nota" type="text" placeholder="Descripción..."></div>
      <button class="btn btn-accent" onclick="savePago()"><span class="mi fill">payments</span>Registrar Pago</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
<script>
// PWA Service Worker Registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(console.error);
}
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const defaultS = {
  theme:'dark',
  tab:'home',
  stack:[],
  currentUser:0,
  house:{name:'Nombre de la Familia',currency:'CLP'},
  members:[
    {id:0,name:'Anita',em:'👱‍♀️',color:'#4edea3'},
    {id:1,name:'Carlos',em:'👨',color:'#bec6e0'},
    {id:2,name:'Mafe',em:'👱‍♀️',color:'#ffb2b7'},
  ],
  filters:{mes:null,cat:'todas',person:'todos'},
  selCat:'super',
  selPagador:0,
  splitPcts:{},
  detalleId:null,
  gastos:[],
  creditos:[],
  pagos:[],
  nGasto:1,nCredito:1,nPago:1,
};
let houseId = localStorage.getItem('ekekos_house_id') || null;
const S_LS = localStorage.getItem('ekekos_prod_state');
let S = defaultS;

// ══════════════════════════════════════════
//  FIREBASE SYNC
// ══════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyAVSuiQF892zrU1VfK0AGJY3MVfJPVVsuA",
  authDomain: "ekekos-home.firebaseapp.com",
  projectId: "ekekos-home",
  storageBucket: "ekekos-home.firebasestorage.app",
  messagingSenderId: "395440073921",
  appId: "1:395440073921:web:dd383d7a92cbefb6737840"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();

function addToHistory(code, name) {
  if(!code) return;
  let hist = JSON.parse(localStorage.getItem('ekekos_history')||'[]');
  hist = hist.filter(x => x.code !== code);
  hist.unshift({code, name});
  localStorage.setItem('ekekos_history', JSON.stringify(hist));
}

let unsubSnapshot = null;
let docRef = null;

function subscribeToHouse(code) {
  if(!code) return;
  if(unsubSnapshot) unsubSnapshot();
  docRef = db.collection('houses').doc(code);
  let isInitialLoad = true;
  unsubSnapshot = docRef.onSnapshot((docSnap) => {
    // Si estamos configurando localmente, NO permitimos que el servidor nos pise los datos
    if (S._isConfiguring) return;

    if (docSnap.exists) {
      const dbS = docSnap.data();
      const localTab = S.tab;
      const localStack = [...(S.stack||[])];
      S = dbS;
      S.tab = localTab;
      S.stack = localStack;
      addToHistory(code, S.house.name);
      localStorage.setItem('ekekos_prod_state', JSON.stringify(S));
      if (!isInitialLoad && typeof render === 'function' && document.getElementById('screen')) {
        render(S.tab);
      }
    } else {
      // Solo creamos en DB si NO estamos en proceso de configuración inicial
      if (!S._isConfiguring) docRef.set(S);
    }
    isInitialLoad = false;
  }, (err) => {
    console.error("Firestore error:", err);
  });
}

function saveState(){
  if(!houseId) return;
  localStorage.setItem('ekekos_prod_state', JSON.stringify(S));
  const snap = JSON.parse(JSON.stringify(S)); // clone
  snap.tab = 'home'; // Enforce safe booting for late joiners
  snap.stack = [];
  docRef.set(snap);
}

const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const CATS=[
  {id:'super',label:'Súper',em:'🛒'},
  {id:'cuentas',label:'Cuentas',em:'⚡'},
  {id:'bolidos',label:'Bólidos',em:'🚗'},
  {id:'comida',label:'Comida',em:'🍽️'},
  {id:'salud',label:'Salud',em:'💊'},
  {id:'carrete',label:'Carrete',em:'🎬'}
];

// ══════════════════════════════════════════
//  ROUTER
// ══════════════════════════════════════════
const TABS=['home','gastos','creditos','perfil'];
const TAB_VIEWS={'home':'home','gastos':'gastos','creditos':'creditos','perfil':'perfil'};

function goTab(tab){
  S.tab=tab; S.stack=[];
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  const ni=document.getElementById('ni-'+tab);
  if(ni)ni.classList.add('active');
  render(tab);
}

function push(view,data={}){
  S.stack.push({view:S.stack.length?S.stack[S.stack.length-1].view:S.tab,data});
  render(view,data);
}

function pop(){
  if(S.stack.length){S.stack.pop();}
  const prev=S.stack.length ? S.stack[S.stack.length-1].view : S.tab;
  render(prev);
}

function render(view,data={}){
  const navViews=['home','gastos','creditos','perfil','reportes'];
  document.getElementById('nav').style.display=navViews.includes(view)?'flex':'none';
  const sc=document.getElementById('screen');
  sc.innerHTML='';
  sc.scrollTop=0;
  const el=document.createElement('div');
  el.className='fade-up';
  el.style.minHeight='100%';
  const fn=VIEWS[view];
  if(fn)el.innerHTML=fn(data);
  sc.appendChild(el);
  if(view==='agregar')initAgregar();
  if(view==='reportes')renderCharts();
  if(view==='config')initConfig();
}

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function fmt(n){return'$'+Math.round(n).toLocaleString('es-CL')}
function fmtD(d){const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('es-CL',{day:'numeric',month:'short'})}
function getMiParte(g){const s=g.split.find(x=>x.id===S.currentUser);return s?g.monto*s.pct/100:0}
function filtered(){
  return S.gastos.filter(g=>{
    const d=new Date(g.fecha+'T12:00:00');
    const mOk=!S.filters.mes||MESES[d.getMonth()]===S.filters.mes;
    const cOk=S.filters.cat==='todas'||g.cat===S.filters.cat;
    const pOk=S.filters.person==='todos'||g.pagador===+S.filters.person||g.split.some(s=>s.id===+S.filters.person);
    return mOk&&cOk&&pOk;
  }).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
}
function curMonth(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')}
function greeting(){const h=new Date().getHours();return h<12?'Buenos días':h<18?'Buenas tardes':'Buenas noches'}
function calcBalances(){
  const bal={};
  S.members.forEach(m=>S.members.forEach(n=>{if(m.id!==n.id){if(!bal[m.id])bal[m.id]={};bal[m.id][n.id]=0}}));
  S.gastos.forEach(g=>{
    g.split.forEach(s=>{
      if(s.id!==g.pagador){
        if(!bal[s.id])bal[s.id]={};
        bal[s.id][g.pagador]=(bal[s.id][g.pagador]||0)+g.monto*s.pct/100;
      }
    });
  });
  S.pagos.forEach(p=>{
    if(!bal[p.de])bal[p.de]={};
    bal[p.de][p.a]=Math.max(0,(bal[p.de][p.a]||0)-p.monto);
  });
  return bal;
}
function eiHTML(g){
  const p=S.members[g.pagador]||{em:'?',name:'?'};
  const mp=getMiParte(g);
  return`<div class="ei" onclick="push('detalle',{id:${g.id}})">
    <div class="ei-icon">${g.em}</div>
    <div style="flex:1;min-width:0">
      <p style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${g.desc}</p>

    </div>
    <div style="text-align:right;flex-shrink:0">

      <p style="font-size:11px;color:var(--outline)">tu parte: ${fmt(mp)}</p>
    </div>
  </div>`;
}

// ══════════════════════════════════════════
//  AGREGAR GASTO LOGIC
// ══════════════════════════════════════════
function initAgregar(){
  const today=new Date().toISOString().split('T')[0];
  const f=document.getElementById('a-fecha');
  if(f)f.value=today;
  S.selCat='super'; S.selPagador=S.currentUser;
  const n=S.members.length;
  const eq=Math.floor(100/n);
  S.splitPcts={};
  S.members.forEach((m,i)=>S.splitPcts[m.id]=eq+(i===0?100-eq*n:0));
  renderSplit();
  updatePreview();
}
function selCat(id,el){
  S.selCat=id;
  document.querySelectorAll('#a-cats .cat-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}
function selPagador(id,el){
  S.selPagador=id;
  document.querySelectorAll('#a-pagador .mem-chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}
function renderSplit(){
  const el=document.getElementById('a-split');
  if(!el)return;
  el.innerHTML=S.members.map(m=>`
    <div class="pct-row">
      <div style="width:36px;height:36px;border-radius:50%;background:${m.color}20;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${m.em}</div>
      <span style="flex:1;font-weight:600;font-size:14px">${m.name}</span>
      <input class="pct-inp" type="number" min="0" max="100" value="${S.splitPcts[m.id]||0}" id="pct-${m.id}" oninput="onPctChange(${m.id},this.value)">
      <span style="font-size:14px;color:var(--outline)">%</span>
    </div>`).join('');
  updatePctTotal();
}
function onPctChange(id,val){
  S.splitPcts[id]=parseInt(val)||0;
  updatePctTotal();
  updatePreview();
}
function updatePctTotal(){
  const tot=S.members.reduce((s,m)=>s+(parseInt(document.getElementById('pct-'+m.id)?.value)||0),0);
  const el=document.getElementById('pct-tot');
  if(el){el.textContent=tot+'%';el.style.color=tot===100?'var(--accent)':'var(--error)';}
}
function updatePreview(){
  const monto=parseFloat(document.getElementById('a-monto')?.value)||0;
  const el=document.getElementById('a-preview');
  if(!el)return;
  el.innerHTML=S.members.map(m=>{
    const pct=parseInt(document.getElementById('pct-'+m.id)?.value)||0;
    const amt=monto*pct/100;
    return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--outline-v)">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:16px">${m.em}</span>
        <span style="font-size:14px;font-weight:600">${m.name}</span>
        <span style="font-size:12px;color:var(--outline)">${pct}%</span>
      </div>
      <span class="mf" style="font-size:15px;font-weight:700">${fmt(amt)}</span>
    </div>`;
  }).join('');
}
function saveGasto(){
  const monto=parseFloat(document.getElementById('a-monto')?.value);
  let desc=(document.getElementById('a-desc')?.value||'').trim();
  const fecha=document.getElementById('a-fecha')?.value;
  if(!monto||monto<=0){showToast('Ingresa un monto');return;}
  const cat=CATS.find(c=>c.id===S.selCat)||CATS[0];
  if(!desc) desc=cat.label; // Make description optional
  const tot=S.members.reduce((s,m)=>s+(parseInt(document.getElementById('pct-'+m.id)?.value)||0),0);
  if(tot!==100){showToast('Los porcentajes deben sumar 100%');return;}
  const split=S.members.map(m=>({id:m.id,pct:parseInt(document.getElementById('pct-'+m.id)?.value||0)})).filter(s=>s.pct>0);
  
  S.gastos.unshift({id:S.nGasto++,desc,cat:S.selCat,em:cat.em,monto,fecha,pagador:S.selPagador,split});
  saveState();
  showToast('¡Gasto guardado! ✅');
  pop();
}

// ══════════════════════════════════════════
//  CRÉDITOS
// ══════════════════════════════════════════
function openCreditoModal(){
  const opts=S.members.map(m=>`<option value="${m.id}">${m.em} ${m.name}</option>`).join('');
  document.getElementById('c-de').innerHTML=opts;
  document.getElementById('c-a').innerHTML=opts;
  document.getElementById('c-a').value=(S.currentUser+1)%S.members.length;
  ['c-monto','c-desc','c-cuotas'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('c-fecha').value=new Date().toISOString().split('T')[0];
  openModal('m-credito');
}
function saveCredito(){
  const de=parseInt(document.getElementById('c-de').value);
  const a=parseInt(document.getElementById('c-a').value);
  const monto=parseFloat(document.getElementById('c-monto').value);
  const desc=(document.getElementById('c-desc').value||'').trim();
  const cuotas=parseInt(document.getElementById('c-cuotas').value);
  const fechaInicio=document.getElementById('c-fecha').value;
  if(de===a){showToast('Selecciona personas distintas');return;}
  if(!monto||monto<=0){showToast('Ingresa un monto válido');return;}
  if(!desc){showToast('Agrega una descripción');return;}
  if(!cuotas||cuotas<1){showToast('Ingresa número de cuotas');return;}
  S.creditos.push({id:S.nCredito++,de,a,desc,montoTotal:monto,cuotas,cuotasPagadas:0,fechaInicio});
  saveState();
  closeModal('m-credito');
  showToast('¡Crédito registrado! 🤝');
  render('creditos');
}
function pagarCuota(id){
  const c=S.creditos.find(x=>x.id===id);
  if(!c||c.cuotasPagadas>=c.cuotas)return;
  c.cuotasPagadas++;
  saveState();
  showToast(`✅ Cuota ${c.cuotasPagadas}/${c.cuotas} pagada`);
  render('creditos');
}

function openPagoModal(){
  const opts=S.members.map(m=>`<option value="${m.id}">${m.em} ${m.name}</option>`).join('');
  document.getElementById('p-de').innerHTML=opts;
  document.getElementById('p-a').innerHTML=opts;
  document.getElementById('p-de').value=S.currentUser;
  document.getElementById('p-a').value=(S.currentUser+1)%S.members.length;
  document.getElementById('p-monto').value='';
  document.getElementById('p-nota').value='';
  openModal('m-pago');
}
function savePago(){
  const de=parseInt(document.getElementById('p-de').value);
  const a=parseInt(document.getElementById('p-a').value);
  const monto=parseFloat(document.getElementById('p-monto').value);
  const nota=(document.getElementById('p-nota').value||'').trim()||'Pago registrado';
  if(de===a){showToast('Selecciona personas distintas');return;}
  if(!monto||monto<=0){showToast('Ingresa un monto válido');return;}
  S.pagos.push({id:S.nPago++,de,a,monto,fecha:new Date().toISOString().split('T')[0],nota});
  saveState();
  closeModal('m-pago');
  showToast('💸 Pago registrado');
  render(S.tab);

function renderCharts(){
  const now=new Date();
  const months6=Array.from({length:6},(_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);return{m:MESES[d.getMonth()],idx:d.getMonth(),yr:d.getFullYear()}});
  // Bar chart
  const barData=months6.map(({m,idx,yr})=>{
    const tot=S.gastos.filter(g=>{const d=new Date(g.fecha+'T12:00:00');return d.getMonth()===idx&&d.getFullYear()===yr}).reduce((s,g)=>s+g.monto,0);
    return{m,tot};
  });
  const maxV=Math.max(...barData.map(b=>b.tot),1);
  const barsEl=document.getElementById('r-bars');
  if(barsEl)barsEl.innerHTML=barData.map((b,i)=>`
    <div class="bar" style="flex:1">
      <div class="bar-track" style="height:120px;width:100%;border-radius:6px 6px 0 0">
        <div class="bar-fill ${i===5?'cur':''}" style="height:${b.tot/maxV*100}%;width:100%;border-radius:6px 6px 0 0"></div>
      </div>
      <span style="font-size:10px;font-weight:700;color:${i===5?'var(--accent)':'var(--outline)'};text-transform:uppercase">${b.m}</span>
      ${b.tot>0?`<span style="font-size:9px;color:var(--on-surface-v)">${fmt(b.tot).replace('$','')}</span>`:''}
    </div>`).join('');
  // Category breakdown
  const catTot={};CATS.forEach(c=>catTot[c.id]=0);
  S.gastos.forEach(g=>catTot[g.cat]=(catTot[g.cat]||0)+g.monto);
  const totAll=Object.values(catTot).reduce((s,v)=>s+v,0)||1;
  const catsEl=document.getElementById('r-cats');
  if(catsEl)catsEl.innerHTML=CATS.filter(c=>catTot[c.id]>0).sort((a,b)=>catTot[b.id]-catTot[a.id]).map(c=>{
    const pct=Math.round(catTot[c.id]/totAll*100);
    return`<div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:18px">${c.em}</span>
          <span style="font-size:13px;font-weight:600">${c.label}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="mf" style="font-size:14px;font-weight:700">${fmt(catTot[c.id])}</span>
          <span style="font-size:11px;color:var(--outline);min-width:28px;text-align:right">${pct}%</span>
        </div>
      </div>
      <div class="pb"><div class="pb-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  // Member breakdown
  const memTot={};S.members.forEach(m=>memTot[m.id]=0);
  S.gastos.forEach(g=>g.split.forEach(s=>memTot[s.id]=(memTot[s.id]||0)+g.monto*s.pct/100));
  const totMem=Object.values(memTot).reduce((s,v)=>s+v,0)||1;
  const memEl=document.getElementById('r-members');
  if(memEl)memEl.innerHTML=S.members.map(m=>{
    const pct=Math.round(memTot[m.id]/totMem*100);
    return`<div style="display:flex;align-items:center;gap:12px">
      <div style="font-size:28px">${m.em}</div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span style="font-size:14px;font-weight:600">${m.name}</span>
          <span class="mf" style="font-size:14px;font-weight:700">${fmt(memTot[m.id])} <span style="font-size:11px;font-weight:400;color:var(--outline)">${pct}%</span></span>
        </div>
        <div class="pb"><div class="pb-fill" style="width:${pct}%;background:${m.color}"></div></div>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  CONFIG LOGIC
// ══════════════════════════════════════════
function initConfig(){
  if(S.members.length === 0) {
    addMember();
  } else {
    renderConfigMembers();
  }
}
function renderConfigMembers(){
  const el=document.getElementById('cfg-members');
  if(!el)return;
  const EMOJIS=['👩','👨','👱‍♀️','👦','👧','🧑'];
  el.innerHTML=S.members.map((m,i)=>`
    <div style="display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:14px;padding:8px 12px">
      <select class="inp" onchange="S.members[${i}].em=this.value;saveState()" style="background:var(--surface-high);color:inherit;border:1.5px solid var(--outline-v);border-radius:10px;font-size:16px;padding:2px;cursor:pointer;outline:none;width:38px;height:38px;text-align:center;display:flex;align-items:center;justify-content:center">
        ${EMOJIS.map(e=>`<option value="${e}" ${m.em===e?'selected':''}>${e}</option>`).join('')}
      </select>
      <input style="flex:1;background:none;border:none;color:var(--on-surface);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;outline:none" value="${m.name}" onchange="S.members[${i}].name=this.value" placeholder="Nombre">
      ${S.members.length>1?`<button onclick="removeMember(${i})" style="background:none;border:none;cursor:pointer;color:var(--error)"><span class="mi" style="font-size:18px">remove_circle</span></button>`:''}
    </div>`).join('');
}
function addMember(){
  const EMOJIS=['👩','👨','👱‍♀️','👦','👧','🧑','👴','👵'];
  const COLORS=['#4edea3','#bec6e0','#ffb2b7','#ffd180','#80deea','#cf93d9'];
  const i=S.members.length;
  S.members.push({id:i,name:'Integrante '+(i+1),em:EMOJIS[i%EMOJIS.length],color:COLORS[i%COLORS.length]});
  saveState();
  renderConfigMembers();
}
function removeMember(idx){
  if(S.members.length <= 1) { showToast('Debe quedar mínimo 1 integrante'); return; }
  S.members.splice(idx,1);
  S.members.forEach((m,i)=>m.id=i);
  if(S.currentUser>=S.members.length)S.currentUser=0;
  saveState();
  renderConfigMembers();
}
function saveConfig(){
  const n=(document.getElementById('cfg-name')?.value||'').trim() || 'Mi Familia';
  const c=document.getElementById('cfg-cur')?.value||'CLP';
  S.house.name=n; S.house.currency=c;
  document.querySelectorAll('#cfg-members input').forEach((inp,i)=>{if(S.members[i])S.members[i].name=inp.value||S.members[i].name;});
  
  // Persistir el ID oficialmente tras completar la configuración
  if(S._tempId) {
    houseId = S._tempId;
    localStorage.setItem('ekekos_house_id', houseId);
    delete S._tempId;
  }
  
  if(houseId) addToHistory(houseId, S.house.name);
  
  // Salir de modo configuración y guardar
  delete S._isConfiguring;
  saveState();
  
  showToast('¡Configuración guardada! 🏠');
  
  // Navegación inmediata a Home
  S.tab = 'home';
  S.stack = [];
  setTimeout(() => {
    goTab('home');
  }, 50);
}

// ══════════════════════════════════════════
//  MULTI-TENANT AUTH
// ══════════════════════════════════════════
function crearHogar() {
  // NO guardamos houseId en localStorage todavía para evitar "familias fantasma"
  const code = 'HK-' + Math.random().toString(36).substring(2, 6).toUpperCase();
  
  // Estado inicial temporal
  S = JSON.parse(JSON.stringify(defaultS));
  S._isConfiguring = true;
  S._tempId = code; // ID temporal hasta que se guarde el config
  S.members = [{id:0, name:'Tu Nombre', em:'👱‍♀️', color:'#4edea3'}];
  
  // Limpiamos referencias previas
  if(unsubSnapshot) unsubSnapshot();
  docRef = db.collection('houses').doc(code);
  
  S.tab = 'config';
  render('config');
  showToast('¡Configuración lista! 🎉');
}

async function unirseHogar(e) {
  const code = (document.getElementById('in-codigo').value || '').trim().toUpperCase();
  if(!code || code.length < 5) return showToast('Código inválido');
  const btn = e.currentTarget;
  const oldHTML = btn.innerHTML;
  btn.innerHTML = '...'; btn.disabled = true;
  try {
    const check = await db.collection('houses').doc(code).get();
    if (!check.exists) { showToast('Hogar no encontrado'); btn.innerHTML=oldHTML; btn.disabled=false; return; }
    houseId = code;
    localStorage.setItem('ekekos_house_id', houseId);
    S = check.data();
    subscribeToHouse(houseId);
    goTab('home');
    showToast('¡Conectado al hogar!');
  } catch(err){
    console.error(err);
    showToast('Error de conexión');
    btn.innerHTML=oldHTML; btn.disabled=false;
  }
}

async function switchHogar(code) {
  try {
    const check = await db.collection('houses').doc(code).get();
    if (!check.exists) { showToast('Hogar ya no existe'); return; }
    houseId = code;
    localStorage.setItem('ekekos_house_id', houseId);
    S = check.data();
    subscribeToHouse(houseId);
    goTab('home');
    showToast('Cambiando de casa');
  } catch(e) {
    showToast('Error de red');
  }
}

function shareCode() {
  const code = houseId || S._tempId || '';
  if(!code) return showToast('Error: No hay código');
  
  const text = `¡Únete a mi hogar en Ekekos Home! 🏠\nUsa este código: ${code}`;
  
  // Siempre intentamos copiar primero como acción garantizada
  copyToClipboard(code);
  
  // Intentamos compartir si es posible (menú nativo móvil)
  if (navigator.share) {
    setTimeout(() => {
      navigator.share({ title: 'Ekekos Home', text: text }).catch(() => {});
    }, 100);
  }
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('¡Código copiado! 📋');
  }).catch(() => {
    showToast('Error al copiar');
  });
}

function salirHogar() {
  // Solo salir del hogar actual para volver al Portal, manteniendo el historial
  houseId = null;
  localStorage.removeItem('ekekos_house_id');
  localStorage.removeItem('ekekos_prod_state');
  if(unsubSnapshot) unsubSnapshot();
  S = JSON.parse(JSON.stringify(defaultS));
  render('ingreso');
}

function logoutApp() {
  if(!confirm('¿Cerrar sesión por completo?\nSe borrará la lista de familias recientes de este dispositivo.')) return;
  localStorage.clear(); // Limpieza total de la App
  location.reload(); // Reiniciar para estado limpio
}

// ══════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════
function toggleTheme(){
  S.theme=S.theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',S.theme);
  saveState();
}

// ══════════════════════════════════════════
//  MODALS
// ══════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tTimer);
  window._tTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
(function init(){
  document.documentElement.setAttribute('data-theme',S.theme);
  const now=new Date();
  S.filters.mes=MESES[now.getMonth()];
  
  // Solo intentamos cargar si hay un ID y un estado local previo válido
  if (houseId) {
    const LS = localStorage.getItem('ekekos_prod_state');
    if (LS) { 
      const parsed = JSON.parse(LS);
      if (parsed.members && parsed.members.length > 0) {
        S = parsed;
        S.tab = 'home';
        S.stack = [];
        subscribeToHouse(houseId);
        goTab('home');
        return;
      }
    }
    // Si houseId existe pero no hay datos locales, limpiamos y vamos a Bienvenida
    // para evitar creaciones automáticas de "familias fantasma".
    localStorage.removeItem('ekekos_house_id');
    houseId = null;
  }
  
  render('ingreso');
})();
</script>
